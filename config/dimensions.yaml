publication:
  title: "The Weekly Intelligencer"
  subtitle: "A weekly briefing on AI and the work it's reshaping"
  first_issue_date: "2026-06-26"

output:
  dir: "./dist"
  images: cache                    # cache (download alongside) | hotlink (source URL)
  open_after_render: false

defaults:
  summary: rewrite                 # raw | rewrite | synthesize
  max_items: 5
  blurb_words: 50                  # words of the article's own lede per item (NYT-brief style; ~40–60)

providers:                         # settings for keyed `api` sources (keys live in .env)
  newsapi:
    key_env: NEWSAPI_KEY
    daily_request_limit: 100       # hard cap (individual plan)
    cache_ttl_hours: 12

dimensions:
  - name: "Frontier AI Research Labs"
    blurb: "The week's models, money, and announcements from the world's leading AI labs"
    summary: rewrite
    layout: by-source              # one labeled row per lab; labs with no items are skipped
    max_per_source: 2              # at most 2 events per lab
    within_days: 7                 # only items from the past 7 days (else the lab is skipped)
    sources:                       # `label` = row heading; `logo` = packaged slug in assets/logos/<slug>.svg
      - { type: feed, label: "OpenAI",          logo: "openai",    url: "https://openai.com/news/rss.xml" }                                 # native
      - { type: feed, label: "Google DeepMind", logo: "deepmind",  url: "https://deepmind.google/blog/rss.xml" }                            # native
      - { type: feed, label: "Alibaba Qwen",    logo: "qwen",      url: "https://news.google.com/rss/search?q=Qwen%20Alibaba%20AI&hl=en-US&gl=US&ceid=US:en" }   # no native RSS (blog dormant)
      - { type: feed, label: "Anthropic",       logo: "anthropic", url: "https://news.google.com/rss/search?q=Anthropic%20Claude&hl=en-US&gl=US&ceid=US:en" }   # no native RSS
      - { type: feed, label: "xAI",             logo: "xai",       url: "https://news.google.com/rss/search?q=xAI%20Grok&hl=en-US&gl=US&ceid=US:en" }           # no native RSS
      - { type: feed, label: "DeepSeek",        logo: "deepseek",  url: "https://news.google.com/rss/search?q=DeepSeek&hl=en-US&gl=US&ceid=US:en" }             # no native RSS
      - { type: feed, label: "Meta",            logo: "meta",      url: "https://news.google.com/rss/search?q=Meta%20Llama%20AI&hl=en-US&gl=US&ceid=US:en" }    # no native RSS

