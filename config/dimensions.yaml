publication:
  title: "The Weekly Intelligencer"
  subtitle: "A weekly briefing on AI and the work it's reshaping"
  first_issue_date: "2026-06-26"

output:
  dir: "./dist"
  images: cache                    # cache (download alongside) | hotlink (source URL)
  open_after_render: false

defaults:
  summary: rewrite                 # raw | rewrite | synthesize
  max_items: 5
  blurb_words: 50                  # words of the article's own lede per item (NYT-brief style; ~40–60)
  tldr_words: 100                  # issue-level TL;DR target length (SPEC §10.3)

dimensions:
  - name: "Frontier AI Research Labs"
    blurb: "The week's models, money, and announcements from the world's leading AI labs"
    summary: rewrite
    layout: by-source              # one labeled row per lab; labs with no items are skipped
    max_per_source: 2              # at most 2 events per lab
    within_days: 7                 # only items from the past 7 days (else the lab is skipped)
    sources:                       # `label` = row heading; `logo` = slug in assets/logos/; feed=RSS, site=scrape official index
      - { type: site, label: "Anthropic",       logo: "anthropic", url: "https://www.anthropic.com/news" }                                  # official newsroom (scraped)
      - { type: feed, label: "Google DeepMind", logo: "deepmind",  url: "https://deepmind.google/blog/rss.xml" }                            # official RSS
      - { type: feed, label: "OpenAI",          logo: "openai",    url: "https://openai.com/news/rss.xml" }                                 # official RSS
      - { type: site, label: "xAI",             logo: "xai",       url: "https://x.ai/news" }                                                # official newsroom (scraped)
      - { type: feed, label: "DeepSeek",        logo: "deepseek",  url: "https://news.google.com/rss/search?q=DeepSeek&hl=en-US&gl=US&ceid=US:en" }             # no official dated blog → Google News
      - { type: site, label: "Meta",            logo: "meta",      url: "https://ai.meta.com/blog/" }                                        # official AI blog (scraped)
      - { type: feed, label: "Alibaba Qwen",    logo: "qwen",      url: "https://news.google.com/rss/search?q=Qwen%20Alibaba%20AI&hl=en-US&gl=US&ceid=US:en" }   # official site is client-only → Google News

  - name: "Trending Social Video & Images"
    blurb: "The week's most-popular videos and images across social platforms, ranked by engagement"
    summary: rewrite
    layout: by-source              # one card per platform; a platform with nothing trending that week is skipped
    max_per_source: 2              # the top one or two per platform
    within_days: 7                 # only the past 7 days
    trends: true                   # track 🔥 context hotness across issues (SPEC §10.2)
    sources:                       # no paid scrapers — YouTube via its free official API; TikTok/IG/FB filled by Claude web search (reading each post's visible counts)
      - { type: youtube, label: "YouTube Shorts", logo: "youtube",   query: "#shorts" }   # free Data API: most-viewed Shorts this week (videoDuration=short, order=viewCount)
      - { type: search,  label: "TikTok",         logo: "tiktok",    query: "TikTok video going viral this week" }        # newly breaking out, not all-time most-viewed
      - { type: search,  label: "Instagram",      logo: "instagram", query: "Instagram reel going viral this week" }
      - { type: search,  label: "Facebook",       logo: "facebook",  query: "Facebook video going viral this week" }

